<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#801C7D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Sales Buddy | SBI General</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSV Parser & PDF Generators -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sbiPurple: '#801C7D',
                        sbiBlue: '#00A9E0',
                        sbiDark: '#212529',
                        sbiLight: '#F7F7F7',
                        footerDark: '#1c2127'
                    },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; -webkit-tap-highlight-color: transparent; }
        .glass-card { 
            background: #ffffff; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02); 
        }
    </style>
</head>
<body class="bg-sbiLight text-sbiDark font-sans antialiased overflow-x-hidden selection:bg-sbiBlue selection:text-white flex flex-col min-h-[100dvh]">

    <!-- APP HEADER -->
    <nav class="fixed top-0 left-0 w-full z-50 bg-white shadow-sm border-b border-gray-100 h-16 flex items-center">
        <div class="px-4 w-full flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="navigateTo('homeView')">
                <div class="w-8 h-8 border border-gray-200 flex items-center justify-center p-1 bg-white">
                    <img src="./image_1.png" alt="SBI" class="max-w-full max-h-full object-contain" onerror="this.outerHTML='<i class=\'fas fa-shield-alt text-sbiBlue\'></i>'" />
                </div>
                <span class="font-bold text-sbiPurple text-sm leading-tight border-l-2 border-gray-200 pl-3">Sales<br>Buddy</span>
            </div>
            
            <a href="https://dip.sbigeneral.in/Login/LoginSBI" target="_blank" class="bg-[#f27421] active:bg-orange-600 text-white px-5 py-2 rounded-full text-sm font-bold shadow flex items-center gap-2 transition-colors tracking-wide">
                <i class="fas fa-sign-in-alt"></i> SIMBA
            </a>
        </div>
    </nav>

    <!-- MAIN APP CONTAINER -->
    <main id="app-container" class="flex-grow flex flex-col pt-16">
        
        <!-- 1. DASHBOARD (HOME VIEW) -->
        <div id="homeView" class="app-view flex flex-col flex-grow transition-opacity duration-300">
            
            <!-- PERSONALIZED PHOTO BANNER (No Text) -->
            <div class="px-5 pt-5">
                <div class="w-full h-40 rounded-2xl overflow-hidden relative shadow-sm bg-gray-200 border border-gray-200">
                    <img src="./banner.png" alt="Welcome Banner" class="w-full h-full object-cover object-center" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1556761175-5973dc0f32e7?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80';"/>
                </div>
            </div>

            <div class="px-5 flex-grow">
                <div class="mb-5 mt-6">
                    <h1 class="text-3xl font-bold text-sbiDark tracking-tight">Welcome back!</h1>
                </div>

                <div class="flex flex-col gap-3">
                    <div class="glass-card p-4 rounded-2xl active:scale-[0.98] transition-transform cursor-pointer border-l-4 border-l-sbiBlue flex items-center gap-4" onclick="navigateTo('quotePageView')">
                        <div class="w-12 h-12 bg-blue-50 text-sbiBlue rounded-full flex items-center justify-center text-xl flex-shrink-0"><i class="fas fa-file-invoice-dollar"></i></div>
                        <div>
                            <h3 class="text-base font-bold text-gray-900 leading-tight">Quick Quote</h3>
                        </div>
                        <i class="fas fa-chevron-right text-gray-300 ml-auto"></i>
                    </div>
                    
                    <div class="glass-card p-4 rounded-2xl active:scale-[0.98] transition-transform cursor-pointer border-l-4 border-l-sbiPurple flex items-center gap-4" onclick="openCalculator('emi_calculator.html', 'homeView')">
                        <div class="w-12 h-12 bg-purple-50 text-sbiPurple rounded-full flex items-center justify-center text-xl flex-shrink-0"><i class="fas fa-calculator"></i></div>
                        <div>
                            <h3 class="text-base font-bold text-gray-900 leading-tight">EMI Calculator</h3>
                        </div>
                        <i class="fas fa-chevron-right text-gray-300 ml-auto"></i>
                    </div>

                    <div class="glass-card p-4 rounded-2xl active:scale-[0.98] transition-transform cursor-pointer border-l-4 border-l-green-500 flex items-center gap-4" onclick="initCashlessView()">
                        <div class="w-12 h-12 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-xl flex-shrink-0"><i class="fas fa-hospital-user"></i></div>
                        <div>
                            <h3 class="text-base font-bold text-gray-900 leading-tight">Cashless Hospital</h3>
                        </div>
                        <i class="fas fa-chevron-right text-gray-300 ml-auto"></i>
                    </div>
                    
                    <div class="glass-card p-4 rounded-2xl active:scale-[0.98] transition-transform cursor-pointer border-l-4 border-l-orange-500 flex items-center gap-4" onclick="navigateTo('downloadsPageView')">
                        <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center text-xl flex-shrink-0"><i class="fas fa-download"></i></div>
                        <div>
                            <h3 class="text-base font-bold text-gray-900 leading-tight">Downloads</h3>
                        </div>
                        <i class="fas fa-chevron-right text-gray-300 ml-auto"></i>
                    </div>
                </div>
            </div>

            <footer class="mt-8 bg-footerDark pt-4 pb-5 px-5 w-full">
                <div class="w-full max-w-md mx-auto">
                    <h3 class="text-sbiBlue font-semibold text-sm mb-3">Customer App</h3>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <a href="https://apps.apple.com/in/app/sbi-general-insurance/id1495616048" target="_blank" class="bg-white text-black py-2 px-2 rounded-lg flex items-center justify-center gap-2 active:bg-gray-200 transition-colors">
                            <i class="fab fa-apple text-2xl"></i>
                            <div class="text-left flex flex-col justify-center">
                                <span class="text-[8px] uppercase font-bold leading-none text-gray-600">Download on</span>
                                <span class="text-xs font-bold leading-tight mt-0.5">App Store</span>
                            </div>
                        </a>
                        <a href="https://play.google.com/store/apps/details?id=com.sbig.insurance&hl=en_IN" target="_blank" class="bg-white text-black py-2 px-2 rounded-lg flex items-center justify-center gap-2 active:bg-gray-200 transition-colors">
                            <i class="fab fa-google-play text-xl text-green-500"></i>
                            <div class="text-left flex flex-col justify-center">
                                <span class="text-[8px] uppercase font-bold leading-none text-gray-600">Get it on</span>
                                <span class="text-xs font-bold leading-tight mt-0.5">Google Play</span>
                            </div>
                        </a>
                    </div>
                    <button onclick="shareOnWhatsApp('Download the official SBI General Customer App...')" class="w-full bg-transparent border border-gray-600 text-gray-300 py-2.5 rounded-lg text-sm font-medium flex items-center justify-center gap-2 active:bg-white/10 transition-colors">
                        <i class="fab fa-whatsapp text-lg"></i> Share App Links via WhatsApp
                    </button>
                </div>
            </footer>
        </div>

        <!-- 2. QUOTE PAGE VIEW -->
        <div id="quotePageView" class="app-view hidden flex-grow px-5 pt-6 transition-opacity duration-300">
            <button onclick="navigateTo('homeView')" class="mb-6 bg-white text-gray-600 active:bg-gray-100 px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2 shadow-sm border border-gray-100 w-max">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-sbiDark mb-1">Select Product</h2>
            </div>
            
            <div class="flex flex-col gap-3">
                <div onclick="openCalculator('super_health.html', 'quotePageView')" class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 active:bg-blue-50 transition-colors border-l-4 border-l-sbiBlue flex items-center gap-4 cursor-pointer">
                    <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center flex-shrink-0"><i class="fas fa-shield-alt text-xl text-sbiBlue"></i></div>
                    <h3 class="text-base font-bold text-sbiDark">Super Health</h3>
                    <i class="fas fa-chevron-right text-gray-300 ml-auto"></i>
                </div>
                
                <div onclick="openCalculator('health_alpha.html', 'quotePageView')" class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 active:bg-purple-50 transition-colors border-l-4 border-l-sbiPurple flex items-center gap-4 cursor-pointer">
                    <div class="w-12 h-12 bg-purple-50 rounded-full flex items-center justify-center flex-shrink-0"><i class="fas fa-heartbeat text-xl text-sbiPurple"></i></div>
                    <h3 class="text-base font-bold text-sbiDark">Health Alpha - Select</h3>
                    <i class="fas fa-chevron-right text-gray-300 ml-auto"></i>
                </div>

                <div onclick="openCalculator('super_top_up.html', 'quotePageView')" class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 active:bg-teal-50 transition-colors border-l-4 border-l-teal-500 flex items-center gap-4 cursor-pointer">
                    <div class="w-12 h-12 bg-teal-50 rounded-full flex items-center justify-center flex-shrink-0"><i class="fas fa-layer-group text-xl text-teal-500"></i></div>
                    <h3 class="text-base font-bold text-sbiDark">Super Top-Up</h3>
                    <i class="fas fa-chevron-right text-gray-300 ml-auto"></i>
                </div>
            </div>
        </div>

        <!-- 3. CASHLESS HOSPITAL VIEW -->
        <div id="cashlessView" class="app-view hidden flex-grow px-5 pt-6 transition-opacity duration-300 flex flex-col h-full">
            <button onclick="navigateTo('homeView')" class="mb-4 bg-white text-gray-600 active:bg-gray-100 px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2 shadow-sm border border-gray-100 w-max shrink-0">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            
            <div class="mb-4 shrink-0">
                <h2 class="text-2xl font-bold text-sbiDark mb-1">Network Hospitals</h2>
            </div>

            <!-- Pre-loader & Upload State -->
            <div id="cashlessStateContainer" class="flex-grow flex items-center justify-center mb-8">
                <!-- Dynamically populated via JS -->
            </div>

            <!-- Main Interactive Search Interface -->
            <div id="cashlessSearchContainer" class="hidden flex-grow flex flex-col h-full pb-4">
                
                <!-- Category Form -->
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-4 shrink-0 flex flex-col gap-3">
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 block">Search Category</label>
                        <select id="searchCategory" onchange="toggleCategoryFields()" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5 text-sm font-semibold outline-none focus:border-sbiPurple text-sbiPurple transition-colors shadow-sm">
                            <option value="pan_india">🌐 Pan India (Search All)</option>
                            <option value="state">📍 State Wise</option>
                            <option value="district">🏢 District Wise</option>
                            <option value="city">🏙️ City Wise</option>
                        </select>
                    </div>

                    <div id="wrapper_text" class="transition-all">
                        <input type="text" id="hospSearchText" placeholder="Enter Hospital Name, City, or Pincode..." class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-sbiBlue transition-colors">
                    </div>

                    <div id="wrapper_state" class="hidden transition-all">
                        <select id="stateSelect" onchange="updateDependentDropdowns('state')" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-sbiBlue">
                            <option value="">Select State...</option>
                        </select>
                    </div>

                    <div id="wrapper_district" class="hidden transition-all">
                        <select id="districtSelect" onchange="updateDependentDropdowns('district')" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-sbiBlue">
                            <option value="">Select District...</option>
                        </select>
                    </div>

                    <div id="wrapper_city" class="hidden transition-all">
                        <select id="citySelect" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-sbiBlue">
                            <option value="">Select City...</option>
                        </select>
                    </div>

                    <button onclick="executeSearch()" class="w-full bg-sbiDark text-white py-3 rounded-xl text-sm font-bold shadow-md active:bg-black transition-colors mt-1 flex items-center justify-center gap-2">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>

                <!-- Action Bar (Hidden until search yields results) -->
                <div id="actionButtons" class="flex gap-3 mb-4 shrink-0 hidden">
                    <button onclick="downloadHospitalsPDF()" class="flex-1 bg-sbiBlue text-white py-2.5 rounded-lg text-sm font-bold flex items-center justify-center gap-2 active:bg-blue-600 transition-colors shadow-sm">
                        <i class="fas fa-file-pdf"></i> Download PDF
                    </button>
                    <button onclick="shareHospitalsWA()" class="flex-1 bg-green-500 text-white py-2.5 rounded-lg text-sm font-bold flex items-center justify-center gap-2 active:bg-green-600 transition-colors shadow-sm">
                        <i class="fab fa-whatsapp text-lg"></i> Share PDF
                    </button>
                </div>

                <!-- Results Area -->
                <div id="resultsWrapper" class="flex-grow relative overflow-hidden flex flex-col hidden">
                    <p class="text-xs text-gray-500 mb-2 font-medium flex justify-between items-center">
                        <span>Found: <span id="hospCount" class="font-bold text-sbiDark">0</span> matches</span>
                        <span id="previewNote" class="text-[9px] uppercase text-sbiBlue font-bold bg-blue-50 px-2 py-0.5 rounded">Preview Mode</span>
                    </p>
                    <div id="hospitalsContainer" class="flex-grow overflow-y-auto pb-6 flex flex-col gap-3">
                        <!-- Cards injected via JS -->
                    </div>
                </div>

            </div>
        </div>
        
        <!-- 4. IFRAME CALCULATOR VIEW -->
        <div id="calculatorView" class="app-view hidden flex-grow flex flex-col bg-white transition-opacity duration-300">
            <div class="w-full bg-white border-b border-gray-100 shadow-sm z-10 px-4 py-2 flex items-center">
                <button onclick="navigateTo(currentCalcBackTarget)" class="text-gray-700 active:text-sbiBlue font-medium flex items-center gap-2 p-2 -ml-2 rounded-lg">
                    <i class="fas fa-arrow-left"></i> <span id="calcBackBtnText" class="text-sm">Back</span>
                </button>
            </div>
            <div class="w-full flex-grow relative bg-gray-50">
                <div id="calcLoader" class="absolute inset-0 flex justify-center items-center z-0"><i class="fas fa-spinner fa-spin text-3xl text-sbiBlue"></i></div>
                <iframe id="calcFrame" src="" class="absolute inset-0 w-full h-full border-none bg-transparent" onload="document.getElementById('calcLoader').classList.add('hidden')"></iframe>
            </div>
        </div>

        <!-- 5. DOWNLOADS CATEGORY VIEW -->
        <div id="downloadsPageView" class="app-view hidden flex-grow px-5 pt-6 transition-opacity duration-300">
            <button onclick="navigateTo('homeView')" class="mb-6 bg-white text-gray-600 active:bg-gray-100 px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2 shadow-sm border border-gray-100 w-max"><i class="fas fa-arrow-left"></i> Back</button>
            <div class="mb-6"><h2 class="text-2xl font-bold text-sbiDark mb-1">Downloads</h2></div>
            <div class="flex flex-col gap-3 pb-8">
                <button onclick="openDownloadCategory('Brochures', 'brochure')" class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-4 text-left border-l-4 border-l-sbiBlue"><i class="fas fa-book-open text-sbiBlue"></i> <h3 class="font-bold">Brochures</h3></button>
                <button onclick="openDownloadCategory('Proposal Forms', 'proposal')" class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-4 text-left border-l-4 border-l-sbiPurple"><i class="fas fa-file-signature text-sbiPurple"></i> <h3 class="font-bold">Proposal Forms</h3></button>
                <button onclick="openDownloadCategory('Policy Wordings', 'policy')" class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-4 text-left border-l-4 border-l-green-500"><i class="fas fa-file-contract text-green-500"></i> <h3 class="font-bold">Policy Wordings</h3></button>
                <button onclick="openDownloadCategory('Claim Forms', 'claim')" class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-4 text-left border-l-4 border-l-red-500"><i class="fas fa-file-medical text-red-500"></i> <h3 class="font-bold">Claim Forms</h3></button>
                <button onclick="openDownloadCategory('Other Forms', 'other')" class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-4 text-left border-l-4 border-l-orange-500"><i class="fas fa-folder-open text-orange-500"></i> <h3 class="font-bold">Other Forms</h3></button>
                <button onclick="openDownloadCategory('Important Lists', 'list')" class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-4 text-left border-l-4 border-l-teal-500"><i class="fas fa-list-check text-teal-500"></i> <h3 class="font-bold">Important Lists</h3></button>
            </div>
        </div>

        <!-- 6. DOWNLOADS LIST VIEW -->
        <div id="downloadsListView" class="app-view hidden flex-grow px-5 pt-6 transition-opacity duration-300">
            <button onclick="navigateTo('downloadsPageView')" class="mb-6 bg-white text-gray-600 active:bg-gray-100 px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2 shadow-sm border border-gray-100 w-max"><i class="fas fa-arrow-left"></i> Folders</button>
            <div class="mb-6"><h2 id="downloadCategoryTitle" class="text-2xl font-bold text-sbiDark">Category</h2></div>
            <div id="downloadFilesContainer" class="flex flex-col gap-3 pb-10"></div>
        </div>
    </main>

    <script>
        const shareOnWhatsApp = (text) => window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        let currentCalcBackTarget = 'homeView';

        // --- NAVIGATION LOGIC ---
        function navigateTo(viewId) {
            document.querySelectorAll('.app-view').forEach(view => view.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId !== 'calculatorView') { document.getElementById('calcFrame').src = ''; document.body.classList.remove('overflow-hidden'); }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openCalculator(url, backTarget = 'homeView') {
            currentCalcBackTarget = backTarget;
            document.getElementById('calcBackBtnText').innerText = backTarget === 'quotePageView' ? 'Products' : 'Dashboard';
            document.getElementById('calcFrame').src = url; 
            document.getElementById('calcLoader').classList.remove('hidden');
            navigateTo('calculatorView');
            document.body.classList.add('overflow-hidden'); 
        }

        // --- DOWNLOADS LOGIC ---
        const docDatabase = {
            'brochure': [{name: "Health Alpha", slug: "health_alpha_brochure"}, {name: "Super Health", slug: "super_health_brochure"}, {name: "Super Top-Up", slug: "super_top_up_brochure"}],
            'proposal': [{name: "Health Alpha", slug: "health_alpha_proposal"}, {name: "Super Health", slug: "super_health_proposal"}, {name: "Super Top-Up", slug: "super_top_up_proposal"}],
            'policy': [{name: "Health Alpha", slug: "health_alpha_policy"}, {name: "Super Health", slug: "super_health_policy"}, {name: "Super Top-Up", slug: "super_top_up_policy"}],
            'claim': [{name: "Health Alpha", slug: "health_alpha_claim"}, {name: "Super Health", slug: "super_health_claim"}, {name: "Super Top-Up", slug: "super_top_up_claim"}],
            'other': [{name: "AML Form", slug: "aml_form"}, {name: "Form 97", slug: "form_97"}],
            'list': [
                {name: "Annexure II", slug: "annexure_ii", icon: "📄"}, 
                {name: "Specific List", slug: "specific_list", icon: "📋"}, 
                {name: "Health Multiplier", slug: "health_multiplier", icon: "✖️"}, 
                {name: "Medical Treatment Abroad", slug: "medical_abroad", icon: "✈️"},
                {name: "Adventure Sports", slug: "adventure_sports", icon: "🪂"},
                {name: "Gym & Sports Injury", slug: "gym_sports_injury", icon: "🏋️"},
                {name: "Global Cover", slug: "global_cover", icon: "🌍"}
            ]
        };

        function openDownloadCategory(catName, catSlug) {
            navigateTo('downloadsListView');
            document.getElementById('downloadCategoryTitle').innerText = catName;
            const container = document.getElementById('downloadFilesContainer');
            container.innerHTML = ''; 
            
            (docDatabase[catSlug] || []).forEach(item => {
                const fileName = item.slug + ".pdf";
                const baseUrl = window.location.href.split('index.html')[0];
                const fileUrl = baseUrl.endsWith('/') ? baseUrl + fileName : baseUrl + '/' + fileName;
                const iconDisplay = item.icon ? `<div class="text-xl">${item.icon}</div>` : `<i class="fas fa-file-pdf text-red-500 text-lg"></i>`;

                container.innerHTML += `
                    <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 flex items-center justify-between gap-3">
                        <div class="flex items-center gap-3 min-w-0">
                            <div class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center flex-shrink-0">${iconDisplay}</div>
                            <div class="truncate"><h4 class="font-bold text-sm text-sbiDark truncate">${item.name}</h4></div>
                        </div>
                        <div class="flex items-center gap-2 flex-shrink-0">
                            <a href="./${fileName}" download class="w-9 h-9 bg-gray-100 text-gray-700 rounded-full flex items-center justify-center"><i class="fas fa-download text-xs"></i></a>
                            <button onclick="shareFileNative('${item.name}', '${catName}', '${fileUrl}')" class="w-9 h-9 bg-green-50 text-green-600 rounded-full flex items-center justify-center"><i class="fab fa-whatsapp"></i></button>
                        </div>
                    </div>`;
            });
        }

        async function shareFileNative(productName, categoryName, fileUrl) {
            const shareText = `Hello! Please find the official ${categoryName} for ${productName} here:\n\n${fileUrl}`;
            if (navigator.share) await navigator.share({ title: productName, text: shareText });
            else shareOnWhatsApp(shareText);
        }

        // --- CASHLESS HOSPITAL DYNAMIC MODULE ---
        let allHospitals = [];
        let filteredHospitals = [];

        function initCashlessView() {
            navigateTo('cashlessView');
            if (allHospitals.length > 0) return; // DB already in memory

            const stateContainer = document.getElementById('cashlessStateContainer');
            stateContainer.innerHTML = '<div class="text-center py-10 text-gray-400"><i class="fas fa-spinner fa-spin text-3xl mb-3 text-sbiBlue"></i><br><span class="text-sm font-medium">Looking for database...</span></div>';
            
            // Try fetching from Repo first
            Papa.parse('./network_hospitals.csv', {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processHospitalData(results.data);
                },
                error: function() {
                    // File not found (or CORS error). Fallback to manual upload UI.
                    renderUploadUI();
                }
            });
        }

        function renderUploadUI() {
            const container = document.getElementById('cashlessStateContainer');
            container.innerHTML = `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-orange-200 text-center flex flex-col items-center gap-3 w-full">
                    <div class="w-16 h-16 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center text-3xl shadow-sm border border-orange-100"><i class="fas fa-file-csv"></i></div>
                    <h3 class="font-bold text-sbiDark text-lg leading-tight">Database Required</h3>
                    <p class="text-sm text-gray-500 mb-2 leading-snug">The hospital network file was not found in the repository. Please upload the CSV file manually.</p>
                    <label class="bg-sbiBlue text-white px-6 py-3 rounded-xl text-sm font-bold cursor-pointer shadow-md active:bg-blue-600 transition-colors w-full">
                        <i class="fas fa-upload mr-2"></i> Select CSV File
                        <input type="file" accept=".csv" class="hidden" onchange="handleCSVUpload(event)">
                    </label>
                </div>
            `;
        }

        function handleCSVUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('cashlessStateContainer').innerHTML = '<div class="text-center py-10 text-gray-400"><i class="fas fa-cog fa-spin text-3xl mb-3 text-sbiPurple"></i><br><span class="text-sm font-medium">Processing Database...</span></div>';

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processHospitalData(results.data);
                },
                error: function(err) {
                    alert("Error parsing CSV file. Please make sure it's a valid standard CSV.");
                    renderUploadUI();
                }
            });
        }

        function processHospitalData(data) {
            allHospitals = data.map(row => ({
                Name: row['Hospital Name'] || '',
                Address: row['Address'] || '',
                District: row['District '] || row['District'] || '',
                City: row['City'] || '',
                State: row['State'] || '',
                Pincode: row['Pincode'] || ''
            }));
            
            document.getElementById('cashlessStateContainer').classList.add('hidden');
            document.getElementById('cashlessSearchContainer').classList.remove('hidden');
            
            populateBaseFilters();
            toggleCategoryFields();
        }

        // --- FILTER & SEARCH LOGIC ---
        function toggleCategoryFields() {
            const cat = document.getElementById('searchCategory').value;
            
            document.getElementById('wrapper_text').classList.add('hidden');
            document.getElementById('wrapper_state').classList.add('hidden');
            document.getElementById('wrapper_district').classList.add('hidden');
            document.getElementById('wrapper_city').classList.add('hidden');

            if(cat === 'pan_india') {
                document.getElementById('wrapper_text').classList.remove('hidden');
            } else if(cat === 'state') {
                document.getElementById('wrapper_state').classList.remove('hidden');
            } else if(cat === 'district') {
                document.getElementById('wrapper_state').classList.remove('hidden');
                document.getElementById('wrapper_district').classList.remove('hidden');
            } else if(cat === 'city') {
                document.getElementById('wrapper_state').classList.remove('hidden');
                document.getElementById('wrapper_district').classList.remove('hidden');
                document.getElementById('wrapper_city').classList.remove('hidden');
            }

            // Reset UI state when switching categories
            document.getElementById('resultsWrapper').classList.add('hidden');
            document.getElementById('actionButtons').classList.add('hidden');
        }

        function populateBaseFilters() {
            const states = [...new Set(allHospitals.map(h => h.State).filter(Boolean))].sort();
            const stateSelect = document.getElementById('stateSelect');
            stateSelect.innerHTML = '<option value="">Select State...</option>';
            states.forEach(s => stateSelect.add(new Option(s, s)));
        }

        function updateDependentDropdowns(levelChanged) {
            const state = document.getElementById('stateSelect').value;
            const distSelect = document.getElementById('districtSelect');
            const citySelect = document.getElementById('citySelect');

            if (levelChanged === 'state') {
                distSelect.innerHTML = '<option value="">Select District...</option>';
                citySelect.innerHTML = '<option value="">Select City...</option>';
                if (state) {
                    const districts = [...new Set(allHospitals.filter(h => h.State === state).map(h => h.District).filter(Boolean))].sort();
                    districts.forEach(d => distSelect.add(new Option(d, d)));
                }
            } else if (levelChanged === 'district') {
                const dist = distSelect.value;
                citySelect.innerHTML = '<option value="">Select City...</option>';
                if (state && dist) {
                    const cities = [...new Set(allHospitals.filter(h => h.State === state && h.District === dist).map(h => h.City).filter(Boolean))].sort();
                    cities.forEach(c => citySelect.add(new Option(c, c)));
                }
            }
        }

        // Helper to format the current search criteria into a clean string
        function getSearchSummary() {
            const cat = document.getElementById('searchCategory').value;
            const term = document.getElementById('hospSearchText').value.trim();
            const state = document.getElementById('stateSelect').value;
            const dist = document.getElementById('districtSelect').value;
            const city = document.getElementById('citySelect').value;

            if (cat === 'pan_india') return term ? `Pan India (Keyword: "${term}")` : "Pan India (All)";
            if (cat === 'state') return `State: ${state}`;
            if (cat === 'district') return `District: ${dist} (${state})`;
            if (cat === 'city') return `City: ${city} (${state})`;
            return "Custom Search";
        }

        function executeSearch() {
            const cat = document.getElementById('searchCategory').value;
            const term = document.getElementById('hospSearchText').value.toLowerCase();
            const state = document.getElementById('stateSelect').value;
            const dist = document.getElementById('districtSelect').value;
            const city = document.getElementById('citySelect').value;

            // Form Validations based on chosen category
            if (cat === 'state' && !state) return alert("Please select a State to search.");
            if (cat === 'district' && (!state || !dist)) return alert("Please select both State and District.");
            if (cat === 'city' && (!state || !dist || !city)) return alert("Please select State, District, and City.");

            // Data Filtering
            filteredHospitals = allHospitals.filter(h => {
                if (cat === 'pan_india') {
                    if (!term) return true; // Show all if empty
                    return h.Name.toLowerCase().includes(term) || h.Pincode.includes(term) || h.City.toLowerCase().includes(term);
                }
                if (cat === 'state') return h.State === state;
                if (cat === 'district') return h.State === state && h.District === dist;
                if (cat === 'city') return h.State === state && h.District === dist && h.City === city;
                return false;
            });

            renderGeneratedHospitals();
        }

        function renderGeneratedHospitals() {
            document.getElementById('resultsWrapper').classList.remove('hidden');
            const container = document.getElementById('hospitalsContainer');
            document.getElementById('hospCount').innerText = filteredHospitals.length;
            
            if(filteredHospitals.length === 0) {
                container.innerHTML = '<div class="text-center py-6 text-gray-400 text-sm">No network hospitals found matching your search.</div>';
                document.getElementById('actionButtons').classList.add('hidden'); // Hide buttons if 0 results
                document.getElementById('previewNote').classList.add('hidden');
                return;
            }

            // Show Download/Share buttons only on successful search
            document.getElementById('actionButtons').classList.remove('hidden');

            // Limit UI rendering to 50 max to keep the app highly responsive
            const renderLimit = Math.min(filteredHospitals.length, 50);
            document.getElementById('previewNote').classList.toggle('hidden', filteredHospitals.length <= 50);

            let html = '';
            for(let i=0; i<renderLimit; i++) {
                const h = filteredHospitals[i];
                html += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col gap-1 border-l-4 border-l-sbiPurple">
                        <h4 class="font-bold text-sbiDark text-sm leading-tight">${h.Name}</h4>
                        <p class="text-xs text-gray-500 leading-snug"><i class="fas fa-map-marker-alt text-gray-300 w-3"></i> ${h.Address}</p>
                        <div class="flex flex-wrap gap-2 mt-2">
                            <span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-[10px] font-medium uppercase">${h.City}</span>
                            <span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-[10px] font-medium uppercase">${h.State} - ${h.Pincode}</span>
                        </div>
                    </div>`;
            }
            
            if(filteredHospitals.length > 50) {
                html += `<div class="text-center py-3 text-xs text-sbiBlue font-bold bg-blue-50 rounded-lg mt-2"><i class="fas fa-info-circle"></i> Showing 50 preview cards.<br>Download or Share PDF for the complete list of ${filteredHospitals.length} hospitals.</div>`;
            }
            
            container.innerHTML = html;
        }

        // --- FULL EXPORT & SHARE LOGIC ---
        function getPDFDocument() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            
            doc.setFontSize(18);
            doc.setTextColor(128, 28, 125); // SBI Purple
            doc.text("SBI General - Cashless Network Hospitals", 14, 20);
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            
            const searchSummary = getSearchSummary();
            doc.text(`Generated on: ${new Date().toLocaleDateString()} | Criteria: ${searchSummary} | Total Matches: ${filteredHospitals.length}`, 14, 28);

            const tableData = filteredHospitals.map(h => [h.Name, h.Address, h.City, h.District, h.State, h.Pincode]);
            
            doc.autoTable({
                startY: 35,
                head: [['Hospital Name', 'Address', 'City', 'District', 'State', 'Pincode']],
                body: tableData,
                theme: 'grid',
                headStyles: { fillColor: [0, 169, 224] }, // SBI Blue
                styles: { fontSize: 8, cellPadding: 3 },
                columnStyles: { 0: { cellWidth: 50 }, 1: { cellWidth: 80 } }
            });

            return doc;
        }

        function downloadHospitalsPDF() {
            if (filteredHospitals.length === 0) return alert("No results to download.");
            const doc = getPDFDocument();
            doc.save('Cashless_Hospitals_SBIG.pdf');
        }

        async function shareHospitalsWA() {
            if (filteredHospitals.length === 0) return alert("No results to share.");
            
            // Generate formatted WhatsApp Text
            const searchSummary = getSearchSummary();
            const waText = `*🏥 SBI General Insurance*\n*Cashless Network Hospitals*\n\n*Search Criteria:* ${searchSummary}\n*Total Hospitals Found:* ${filteredHospitals.length}\n\n_Please find the complete list attached as a PDF document._`;

            const doc = getPDFDocument();
            const pdfBlob = doc.output('blob');
            const file = new File([pdfBlob], 'Cashless_Hospitals_SBIG.pdf', { type: 'application/pdf' });
            
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'SBI General Cashless Hospitals',
                        text: waText,
                    });
                } catch (error) {
                    console.log('Sharing failed or cancelled:', error);
                }
            } else {
                // Fallback for desktop browsers without file share capabilities
                alert("Your device browser doesn't support direct file sharing. The PDF will be downloaded instead so you can attach it manually.");
                downloadHospitalsPDF();
                
                // Still try to open WhatsApp Web with the formatted text
                setTimeout(() => { shareOnWhatsApp(waText); }, 1500);
            }
        }
    </script>
</body>
</html>
